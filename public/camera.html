<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync-Camera Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        .camera-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #videoPreview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            padding: 20px;
            z-index: 100;
        }

        .camera-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .camera-name {
            font-size: 18px;
            font-weight: 600;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
        }

        .status-dot.connected {
            background: #44ff44;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            padding: 30px 20px;
            z-index: 100;
        }

        .recording-indicator {
            text-align: center;
            margin-bottom: 20px;
        }

        .recording-status {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .recording-status.recording {
            color: #ff4444;
        }

        .recording-duration {
            font-size: 14px;
            color: #ccc;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .control-btn.recording {
            background: #ff4444;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            font-size: 12px;
        }

        .metric {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .metric-value {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: #44ff44;
        }

        .metric-label {
            color: #ccc;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            opacity: 0.3;
        }

        .grid-line {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
        }

        .grid-line.vertical {
            width: 1px;
            height: 100%;
            left: 33.33%;
        }

        .grid-line.vertical:nth-child(2) {
            left: 66.66%;
        }

        .grid-line.horizontal {
            height: 1px;
            width: 100%;
            top: 33.33%;
        }

        .grid-line.horizontal:nth-child(4) {
            top: 66.66%;
        }

        .error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.9);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            max-width: 300px;
        }

        @media (orientation: landscape) {
            .header, .controls {
                padding-left: 40px;
                padding-right: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="camera-container">
        <video id="videoPreview" autoplay muted playsinline></video>
        
        <div class="overlay">
            <div class="header">
                <div class="camera-info">
                    <div class="camera-name" id="cameraName">Camera Loading...</div>
                    <div class="connection-status">
                        <div class="status-dot" id="statusDot"></div>
                        <span id="connectionText">Connecting...</span>
                    </div>
                </div>
            </div>

            <div class="grid-overlay" id="gridOverlay" style="display: none;">
                <div class="grid-line vertical"></div>
                <div class="grid-line vertical"></div>
                <div class="grid-line horizontal"></div>
                <div class="grid-line horizontal"></div>
            </div>

            <div class="controls">
                <div class="recording-indicator">
                    <div class="recording-status" id="recordingStatus">Ready to Record</div>
                    <div class="recording-duration" id="recordingDuration">00:00:00</div>
                </div>

                <div class="control-buttons">
                    <button class="control-btn" id="recordBtn" onclick="toggleRecording()">⚫</button>
                    <button class="control-btn" id="gridBtn" onclick="toggleGrid()">⊞</button>
                    <button class="control-btn" id="settingsBtn" onclick="showSettings()">⚙️</button>
                </div>

                <div class="metrics">
                    <div class="metric">
                        <span class="metric-value" id="fps">0</span>
                        <span class="metric-label">FPS</span>
                    </div>
                    <div class="metric">
                        <span class="metric-value" id="latency">--</span>
                        <span class="metric-label">Latency</span>
                    </div>
                    <div class="metric">
                        <span class="metric-value" id="battery">--</span>
                        <span class="metric-label">Battery</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="error-message" id="errorMessage" style="display: none;"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        class MobileCameraApp {
            constructor() {
                this.socket = null;
                this.mediaStream = null;
                this.mediaRecorder = null;
                this.isRecording = false;
                this.recordingStartTime = null;
                this.cameraId = this.getCameraId();
                
                this.init();
            }

            getCameraId() {
                const params = new URLSearchParams(window.location.search);
                return params.get('camera') || 'camera_a';
            }

            async init() {
                try {
                    await this.setupCamera();
                    this.setupWebSocket();
                    this.setupMetrics();
                    this.updateUI();
                } catch (error) {
                    this.showError('Failed to initialize camera: ' + error.message);
                }
            }

            async setupCamera() {
                try {
                    // Get camera stream with high quality settings
                    this.mediaStream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'environment', // Use back camera
                            width: { ideal: 1920 },
                            height: { ideal: 1080 },
                            frameRate: { ideal: 30 }
                        },
                        audio: true
                    });

                    const videoElement = document.getElementById('videoPreview');
                    videoElement.srcObject = this.mediaStream;

                    // Setup media recorder for streaming
                    this.mediaRecorder = new MediaRecorder(this.mediaStream, {
                        mimeType: 'video/webm;codecs=vp9'
                    });

                    this.mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            this.sendVideoChunk(event.data);
                        }
                    };

                    document.getElementById('cameraName').textContent = 
                        this.cameraId === 'camera_a' ? 'Camera A (Back Wall)' : 'Camera B (Back Wall)';
                    
                } catch (error) {
                    throw new Error('Camera access denied or not available');
                }
            }

            setupWebSocket() {
                // Get server URL from current location
                const serverUrl = window.location.origin;
                this.socket = io(serverUrl);

                this.socket.on('connect', () => {
                    console.log('Connected to sync server');
                    this.updateConnectionStatus(true);
                    
                    // Join camera session
                    this.socket.emit('camera-register', {
                        cameraId: this.cameraId,
                        capabilities: this.getCameraCapabilities()
                    });
                });

                this.socket.on('disconnect', () => {
                    console.log('Disconnected from server');
                    this.updateConnectionStatus(false);
                });

                this.socket.on('recording-command', (data) => {
                    if (data.command === 'start') {
                        this.startRecording();
                    } else if (data.command === 'stop') {
                        this.stopRecording();
                    }
                });

                this.socket.on('sync-signal', (data) => {
                    // Handle synchronization signals
                    this.updateLatency(data.latency);
                });
            }

            setupMetrics() {
                // Update FPS counter
                let frameCount = 0;
                const video = document.getElementById('videoPreview');
                
                setInterval(() => {
                    if (video.readyState >= 2) {
                        frameCount++;
                    }
                }, 1000/30); // Check 30 times per second

                setInterval(() => {
                    document.getElementById('fps').textContent = Math.round(frameCount);
                    frameCount = 0;
                }, 1000);

                // Update battery status
                if ('getBattery' in navigator) {
                    navigator.getBattery().then((battery) => {
                        const updateBattery = () => {
                            const level = Math.round(battery.level * 100);
                            document.getElementById('battery').textContent = level + '%';
                        };
                        
                        battery.addEventListener('levelchange', updateBattery);
                        updateBattery();
                    });
                }

                // Update recording duration
                setInterval(() => {
                    if (this.isRecording && this.recordingStartTime) {
                        const elapsed = Date.now() - this.recordingStartTime;
                        const duration = this.formatDuration(elapsed);
                        document.getElementById('recordingDuration').textContent = duration;
                    }
                }, 1000);
            }

            getCameraCapabilities() {
                const video = document.getElementById('videoPreview');
                const stream = video.srcObject;
                
                if (stream) {
                    const videoTrack = stream.getVideoTracks()[0];
                    const settings = videoTrack.getSettings();
                    
                    return {
                        width: settings.width,
                        height: settings.height,
                        frameRate: settings.frameRate,
                        aspectRatio: settings.aspectRatio
                    };
                }
                
                return null;
            }

            updateConnectionStatus(connected) {
                const statusDot = document.getElementById('statusDot');
                const connectionText = document.getElementById('connectionText');
                
                if (connected) {
                    statusDot.classList.add('connected');
                    connectionText.textContent = 'Connected';
                } else {
                    statusDot.classList.remove('connected');
                    connectionText.textContent = 'Disconnected';
                }
            }

            updateLatency(latency) {
                document.getElementById('latency').textContent = latency + 'ms';
            }

            startRecording() {
                if (!this.isRecording) {
                    this.isRecording = true;
                    this.recordingStartTime = Date.now();
                    
                    // Start media recorder
                    this.mediaRecorder.start(100); // Send chunks every 100ms
                    
                    // Update UI
                    document.getElementById('recordBtn').classList.add('recording');
                    document.getElementById('recordBtn').textContent = '⏹️';
                    document.getElementById('recordingStatus').textContent = 'Recording';
                    document.getElementById('recordingStatus').classList.add('recording');
                    
                    // Prevent screen from sleeping
                    if ('wakeLock' in navigator) {
                        navigator.wakeLock.request('screen');
                    }
                }
            }

            stopRecording() {
                if (this.isRecording) {
                    this.isRecording = false;
                    this.recordingStartTime = null;
                    
                    // Stop media recorder
                    this.mediaRecorder.stop();
                    
                    // Update UI
                    document.getElementById('recordBtn').classList.remove('recording');
                    document.getElementById('recordBtn').textContent = '⚫';
                    document.getElementById('recordingStatus').textContent = 'Ready to Record';
                    document.getElementById('recordingStatus').classList.remove('recording');
                    document.getElementById('recordingDuration').textContent = '00:00:00';
                }
            }

            sendVideoChunk(chunk) {
                if (this.socket && this.socket.connected) {
                    // Convert blob to array buffer for transmission
                    const reader = new FileReader();
                    reader.onload = () => {
                        this.socket.emit('video-chunk', {
                            cameraId: this.cameraId,
                            timestamp: Date.now(),
                            data: reader.result
                        });
                    };
                    reader.readAsArrayBuffer(chunk);
                }
            }

            formatDuration(ms) {
                const seconds = Math.floor(ms / 1000);
                const minutes = Math.floor(seconds / 60);
                const hours = Math.floor(minutes / 60);
                
                return String(hours).padStart(2, '0') + ':' +
                       String(minutes % 60).padStart(2, '0') + ':' +
                       String(seconds % 60).padStart(2, '0');
            }

            showError(message) {
                const errorElement = document.getElementById('errorMessage');
                errorElement.textContent = message;
                errorElement.style.display = 'block';
                
                setTimeout(() => {
                    errorElement.style.display = 'none';
                }, 5000);
            }

            updateUI() {
                // Keep screen on during use
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden && this.isRecording) {
                        // Minimize impact when app goes to background during recording
                        console.log('App backgrounded during recording');
                    }
                });
            }
        }

        // Global functions for UI
        function toggleRecording() {
            if (app.isRecording) {
                app.stopRecording();
            } else {
                app.startRecording();
            }
        }

        function toggleGrid() {
            const grid = document.getElementById('gridOverlay');
            const btn = document.getElementById('gridBtn');
            
            if (grid.style.display === 'none') {
                grid.style.display = 'block';
                btn.style.background = '#44ff44';
            } else {
                grid.style.display = 'none';
                btn.style.background = 'rgba(255, 255, 255, 0.2)';
            }
        }

        function showSettings() {
            alert('Settings: Use browser settings to change camera resolution and quality');
        }

        // Initialize app
        let app;
        document.addEventListener('DOMContentLoaded', () => {
            app = new MobileCameraApp();
        });

        // Handle orientation changes
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                if (app.mediaStream) {
                    // Refresh video constraints on orientation change
                    const video = document.getElementById('videoPreview');
                    video.srcObject = app.mediaStream;
                }
            }, 500);
        });
    </script>
</body>
</html>
